name: Remove branch folder from gh-pages

on: delete

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  delete-folder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GH_PAT }}

      - name: Delete branch folder
        run: rm -rf "${{ github.event.ref }}"

      - name: Push to gh-pages
        run: |
          git add --all .
          if [[ $(git status --porcelain) ]]; then
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
            git commit -m "Cleanup ${{ github.event.ref }}@${{ github.sha }}"
            # Retry loop to handle concurrent pushes from other branches.
            # `git push || git pull --rebase` is safe under set -e: the || prevents
            # a failed push from aborting the script before the rebase retry.
            for i in 1 2 3 4 5; do
              git push && break || { echo "Push failed on attempt $i, retrying..." >&2; git pull --rebase; }
            done
          else
            echo "No changes, nothing to remove"
          fi

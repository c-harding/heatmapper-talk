name: Remove branch folder from gh-pages
run-name: "Remove branch folder '${{ inputs.branch || github.event.ref }}' from gh-pages${{ inputs.dry_run && ' (Dry run)' || '' }}"

on:
  delete:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch folder to remove"
        required: true
      dry_run:
        description: "Dry run"
        type: boolean

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  delete-folder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Delete branch folder
        run: rm -rf "${{ inputs.branch || github.event.ref }}"

      - name: Prepare changes
        run: |
          git add --all .
          git status --short

      - name: Push to gh-pages
        if: ${{ !inputs.dry_run }}
        run: |
          if [[ $(git status --porcelain) ]]; then
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
            git commit -m "Cleanup ${{ inputs.branch || github.event.ref }}@${{ github.sha }}"
            # Retry loop to handle concurrent pushes from other branches.
            # `git push || git pull --rebase` is safe under set -e: the || prevents
            # a failed push from aborting the script before the rebase retry.
            for i in 4 3 2 1 0; do
              git push && break || [[ $i -eq 0 ]] && { echo "All push attempts failed" >&2; exit 1; }
              echo "Push failed, $i retries left..." >&2
              git pull --rebase
            done
          else
            echo "No changes, nothing to remove"
          fi

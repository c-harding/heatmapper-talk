name: Build Slidev site
run-name: "Build Slidev site${{ inputs.dry_run && ' (Dry run)' || '' }}"

on:
  push:
    branches-ignore:
      - gh-pages

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        type: boolean

permissions:
  contents: read

concurrency:
  group: "build-${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Log in to GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_KEY }}

      - name: Install dependencies
        run: pnpm install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Slidev
        run: pnpm build --base ${{ steps.pages.outputs.base_path }}/${{ github.head_ref || github.ref_name }}/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy build to gh-pages
        run: |
          DEST="gh-pages/${{ github.head_ref || github.ref_name }}"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          rsync -a --delete dist/ "$DEST"/
          git add --all "$DEST"

      - name: Show changes
        working-directory: gh-pages
        run: git status --short

      - name: Push to gh-pages
        id: push
        if: ${{ !inputs.dry_run }}
        working-directory: gh-pages
        run: |
          if [[ $(git status --porcelain) ]]; then
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
            git commit -m "Deploy ${{ github.head_ref || github.ref_name }}@${{ github.sha }}"
            # Retry loop to handle concurrent pushes from other branches.
            # `git push || git pull --rebase` is safe under set -e: the || prevents
            # a failed push from aborting the script before the rebase retry.
            for i in 1 2 3 4 5; do
              git push && break || { echo "Push failed on attempt $i, retrying..." >&2; git pull --rebase; }
            done
          else
            echo "No changes, nothing to deploy"
          fi
